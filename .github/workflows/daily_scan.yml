name: 毎朝スクリーニング自動実行

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: スクリーニング実行
        run: python legend_data.py
        timeout-minutes: 20

      - name: 結果をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add legend_result.json legend_history.json
          git diff --staged --quiet || git commit -m "📊 自動スキャン: $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')"
          git push
